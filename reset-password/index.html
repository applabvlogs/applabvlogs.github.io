<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - App</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        button {
            background: white;
            color: #667eea;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            margin-top: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Redirecting to App...</h2>
        <p id="status">Please wait...</p>
        <button id="manualButton" style="display:none;">Open App Manually</button>
    </div>

    <script>
        // Get parameters from URL
        const urlParams = new URLSearchParams(window.location.search);
        const userId = urlParams.get('userId');
        const secret = urlParams.get('secret');
        
        const statusEl = document.getElementById('status');
        const manualButton = document.getElementById('manualButton');
        
        if (userId && secret) {
            // For Expo Go, use the exp:// scheme with your local IP
            // You need to replace 192.168.1.7 with your actual Expo Metro IP
            const expoDeepLink = `exp://192.168.1.7:8081/--/reset-password?userId=${encodeURIComponent(userId)}&secret=${encodeURIComponent(secret)}`;
            
            console.log('Attempting to open:', expoDeepLink);
            statusEl.textContent = 'Opening app...';
            
            // Try to open the app
            window.location.href = expoDeepLink;
            
            // Show manual button after 2 seconds
            setTimeout(() => {
                manualButton.style.display = 'block';
                manualButton.onclick = () => {
                    window.location.href = expoDeepLink;
                };
                statusEl.textContent = 'If the app doesn\'t open automatically, click the button below.';
            }, 2000);
        } else {
            statusEl.textContent = 'Invalid reset link. Missing parameters.';
        }
    </script>
</body>
</html>
